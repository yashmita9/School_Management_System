# ==============================
# Root Logger
# ==============================

status = error
name = PropertiesConfig

rootLogger.level = info
rootLogger.appenderRefs = console, file, errorFile
rootLogger.appenderRef.console.ref = ConsoleAppender
rootLogger.appenderRef.file.ref = RollingFileAppender
rootLogger.appenderRef.errorFile.ref = ErrorFileAppender


# ==============================
# Console Appender
# ==============================
appender.console.type = Console
appender.console.name = ConsoleAppender
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} [%t] %-5level %c{1} - %msg%n


# ==============================
# Rolling File Appender
# ==============================
appender.file.type = RollingFile
appender.file.name = RollingFileAppender
appender.file.fileName = logs/app.log
appender.file.filePattern = logs/app-%d{yyyy-MM-dd}-%i.log.gz

appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} [%t] %-5level %c{1} - %msg%n

# Rotation policies
appender.file.policies.type = Policies

# Daily rotate
appender.file.policies.time.type = TimeBasedTriggeringPolicy
appender.file.policies.time.interval = 1

# Size based rotate (10MB)
appender.file.policies.size.type = SizeBasedTriggeringPolicy
appender.file.policies.size.size = 10MB


# ==============================
# Error File Appender (Only ERROR logs)
# ==============================
appender.error.type = RollingFile
appender.error.name = ErrorFileAppender
appender.error.fileName = logs/error.log
appender.error.filePattern = logs/error-%d{yyyy-MM-dd}.log

appender.error.layout.type = PatternLayout
appender.error.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} [%t] %-5level %c{1} - %msg%n

# Only ERROR logs
appender.error.filter.threshold.type = ThresholdFilter
appender.error.filter.threshold.level = error

# Daily rotate
appender.error.policies.type = Policies
appender.error.policies.time.type = TimeBasedTriggeringPolicy
appender.error.policies.time.interval = 1